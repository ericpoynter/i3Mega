[tmc2209 stepper_x]
uart_pin: PD5
run_current: 0.8
stealthchop_threshold: 0

[tmc2209 stepper_y]
uart_pin: PD0
run_current: 0.8
stealthchop_threshold: 0

[tmc2209 stepper_z]
uart_pin: PE1
run_current: 0.8
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PD12
run_current: 0.8
stealthchop_threshold: 0

[tmc2209 extruder]
uart_pin: nhk:gpio0
tx_pin: nhk:gpio1
interpolate: false
sense_resistor: 0.100
run_current: 0.8




