[stepper_x]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PC1
position_endstop: 0
position_max: 230
homing_speed: 100

[stepper_y]
step_pin: PA15
dir_pin: !PA8
enable_pin: !PD1
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PC3
position_endstop: 0
position_max: 220
homing_speed: 100

[stepper_z]
step_pin: PE2
dir_pin: PE3
enable_pin: !PE0
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5                
position_max: 140
homing_speed: 20
second_homing_speed: 4.0
homing_retract_dist: 4.0

[stepper_z1]
step_pin: PD11
dir_pin: PD10
enable_pin: !PD13
rotation_distance: 8
microsteps: 16

[extruder]
step_pin: PD15
dir_pin: PD14
enable_pin: !PC7
full_steps_per_rotation: 200
microsteps: 16
gear_ratio: 50:17
nozzle_diameter: 0.400
filament_diameter: 1.750
rotation_distance: 22.638  #New RD = Old RD *(120-x)/100  #####  G1 E100 F100   ####
heater_pin: PB3
sensor_pin: PA2
sensor_type: EPCOS 100K B57560G104F
#########   PID_CALIBRATE HEATER=extruder TARGET=245  PCF 25%    ###########
# Dragon: EPCOS 100K B57560G104F
# DragonFLY: EPCOS 100K B57560G104F  
# Phaetus Rapido: ATC Semitec 104NT-4-R025H42G
# Voron Revo: ATC Semitec 104GT-2
smooth_time: 2.0
min_temp: 0
max_temp: 250
max_power: 1.0
min_extrude_temp: 170
max_extrude_only_distance: 150
max_extrude_only_velocity: 120
max_extrude_cross_section: 5
pressure_advance: 0.04
pressure_advance_smooth_time: 0.040