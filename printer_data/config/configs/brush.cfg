[gcode_macro CLEAN_NOZZLE]
variable_start_x: 231
variable_start_y: 10
variable_start_z: -2
variable_wipe_dist:50
variable_wipe_qty: 2
variable_wipe_spd: 300
variable_raise_distance: 15

gcode:
 _CG28
 G90
 G1 Z{raise_distance}
 G1 X{start_x} Y{start_y} F6000
 G1 Z{start_z} F1500
 
## Wipe nozzle
 {% for wipes in range(1, (wipe_qty + 1)) %}
   G1 X{start_x - 2} Y{start_y + wipe_dist} F{wipe_spd * 60}
   G1 X{start_x} Y{start_y} F{wipe_spd * 60}
   G1 X{start_x - 2} Y{start_y + wipe_dist} F{wipe_spd * 60}
   G1 X{start_x} Y{start_y} F{wipe_spd * 60}
 {% endfor %}

 ## Raise nozzle
 G1 Z{raise_distance}
 G1 Y0