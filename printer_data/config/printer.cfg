#Pi 3 Model B Plus Rev 1.3
#BTT SKR 2
#STM32H743

[mcu]
Serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_1A0043001951303037363639-if00
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

#mcu can placeholder
#####

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 5000
max_z_velocity: 15
max_z_accel: 200

[include configs/*.cfg]

## Client variable macro for your printer.cfg
[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos    : True
variable_custom_park_x     : 231
variable_custom_park_y     : 1.0
gcode:

