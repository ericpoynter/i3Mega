#Pi 3 Model B Plus Rev 1.3
#BTT SKR 2
#STM32H743

[mcu]
Serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_1A0043001951303037363639-if00
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

#mcu can placeholder
#####

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 5000
max_z_velocity: 30
max_z_accel: 200
square_corner_velocity : 4

[include configs/*.cfg]

## Client variable macro for your printer.cfg
[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos    : True
variable_custom_park_x     : 231
variable_custom_park_y     : 0
variable_custom_park_dz    : 10.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract           : 2.0   ; the value to retract while PAUSE
variable_cancel_retract    : 2.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract     : 35.0  ; retract speed in mm/s
variable_unretract         : 1.8   ; the value to unretract while RESUME
variable_speed_unretract   : 35.0  ; unretract speed in mm/s
variable_speed_hop         : 15.0  ; z move speed in mm/s
variable_speed_move        : 100.0 ; move speed in mm/s
variable_park_at_cancel    : True  ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x  : 0     ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y  : 220   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_use_fw_retract    : False ; use fw_retraction instead of the manual version [True/False]
variable_idle_timeout      : 14400     ; time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
variable_filament_load     : 160
variable_filament_load_speed: 300
variable_filament_unload   : -80 
#variable_runout_sensor    : ""    ; If a sensor is defined, it will be used to cancel the execution of RESUME in case no filament is detected.

